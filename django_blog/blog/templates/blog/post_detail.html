{% extends "blog/base.html" %}

{% block content %}

<h1>{{ post.title }}</h1>

<p>{{ post.content }}</p>

<p>Author: {{ post.author }}</p>

<p>Published: {{ post.published_date }}</p>

<br>

<a href="{% url 'post_update' post.pk %}">Edit</a>
<a href="{% url 'post_delete' post.pk %}">Delete</a>
<a href="{% url 'posts' %}">Back</a>

{% endblock %}
